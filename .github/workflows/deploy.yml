name: Build and Deploy to GitHub Pages

on:
  push:
    branches:
      - main  # หรือเปลี่ยนเป็น master ตามชื่อกิ่งหลักของคุณ

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # หรือเวอร์ชันที่คุณใช้

      - name: Install Dependencies
        run: npm install

      - name: Build Angular Project
        # แก้ /pre-weddingcard/ ให้ตรงกับชื่อ Repository ของคุณ
        run: npx ng build --base-href /pre-weddingcard/

      - name: Deploy to GitHub Pages
        uses: JamesIves/github-pages-deploy-action@v4
        with:
          folder: dist/pre-weddingcard # แก้ให้ตรงกับชื่อโฟลเดอร์ใน dist
          branch: gh-pages # กิ่งที่ใช้แสดงผลหน้าเว็บ